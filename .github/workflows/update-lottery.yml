name: Update Lottery Data

on:
  schedule:
    - cron: '0 11 1,16 * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Scrape latest draw
        run: |
          cd scraper
          python main.py scrape --source sanook --latest 2>&1 || true
          python main.py stats 2>&1 || true

      - name: Count draws in DB
        id: count
        run: |
          COUNT=$(python3 -c "
          import sys, os
          sys.path.insert(0, 'scraper')
          from database.models import init_db
          from database.repository import get_all_draws
          conn = init_db('scraper/lottery.db')
          rows = get_all_draws(conn)
          conn.close()
          print(len(rows))
          " 2>/dev/null || echo "0")
          echo "draws=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Draws in DB: $COUNT"

      - name: Export to JSON
        if: steps.count.outputs.draws != '0'
        run: |
          cd scraper
          python main.py export --output ../frontend/public/lottery_data.json
          echo "Exported ${{ steps.count.outputs.draws }} draws"

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/lottery_data.json
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit"
          else
            git commit -m "data: update lottery draw $(date +'%Y-%m-%d')"
            git push
          fi
