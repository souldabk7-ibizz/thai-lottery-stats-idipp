name: Update Lottery Data

on:
  # Run automatically on draw days at 18:00 Bangkok time (11:00 UTC)
  schedule:
    - cron: '0 11 1,16 * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scraper dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape latest draw
        run: |
          cd scraper
          python main.py scrape --source sanook --latest
          python main.py stats

      - name: Export to JSON
        run: |
          cd scraper
          python main.py export --output ../frontend/public/lottery_data.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/lottery_data.json scraper/lottery.db
          git diff --staged --quiet || git commit -m "data: update lottery draw $(date +'%Y-%m-%d')"
          git push
